<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALIVE Studio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #1e1e1e;
      color: #d4d4d4;
    }
    
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #root {
      width: 100%;
      height: 100%;
    }
    
    .loading {
      text-align: center;
      padding: 20px;
    }
    
    .loading h1 {
      margin-bottom: 20px;
      color: #4ec9b0;
      font-size: 24px;
    }
    
    .loading p {
      color: #858585;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <h1>🚀 ALIVE Studio</h1>
      <p>Loading components...</p>
    </div>
  </div>
  
  <script type="module" src="main.js"></script>
</body>
</html>
